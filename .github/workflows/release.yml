name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: cliptunnel-darwin-arm64
            features: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: cliptunnel-darwin-x86_64
            features: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: cliptunnel-linux-x86_64
            features: "--no-default-features"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: cliptunnel-linux-aarch64
            features: "--no-default-features"

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Install cross-compilation toolchain for aarch64-linux
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/cliptunnel ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          shasum -a 256 * > checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05a6b97e28bec9ce29e05c0b9303351fc40ae2  # v2.2.2
        with:
          generate_release_notes: true
          files: artifacts/*
